<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warkop Singo Kasir</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
    body {background:#f5f5f5}
  .container {max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
  .header {background:#8B4513;color:#fff;padding:15px;text-align:center;font-weight:bold}
  .tabs {display:flex;background:#eee}
  .tab {flex:1;padding:12px;text-align:center;cursor:pointer;border-bottom:3px solid transparent}
  .tab.active {background:#fff;border-bottom:3px solid #8B4513;font-weight:bold}
  .content {padding:15px}
  .section {display:none}
  .section.active {display:block}
  .menu-grid {display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}
  .menu-item {border:1px solid #ddd;padding:10px;border-radius:8px;text-align:center;cursor:pointer}
  .menu-item:hover {background:#f9f9f9}
  .cart {border-top:2px dashed #ddd;margin-top:15px;padding-top:15px}
  .cart-item {display:flex;justify-content:space-between;margin-bottom:8px}
  .total {font-size:18px;font-weight:bold;text-align:right;margin:15px 0}
  .btn {width:100%;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:8px}
  .btn-primary {background:#8B4513;color:#fff}
  .btn-success {background:#25D366;color:#fff}
  .btn-danger {background:#dc3545;color:#fff}
    input,select {width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
    table {width:100%;border-collapse:collapse;margin-top:10px}
    th,td {border:1px solid #ddd;padding:8px;text-align:left;font-size:14px}
  .info-box {background:#f0f0f0;padding:10px;border-radius:8px;margin-bottom:10px;font-size:14px}
  .login-box {padding:20px}
  .hidden {display:none}
  </style>
</head>
<body>
<div class="container">
  <div class="header" id="judulApp">WARKOP SINGO</div>
  <div id="loginSection" class="login-box">
    <h3>Login Kasir</h3>
    <select id="pilihShift">
      <option value="">Pilih Shift</option>
      <option value="PAGI">PAGI</option>
      <option value="SIANG">SIANG</option>
      <option value="MALAM">MALAM</option>
    </select>
    <input type="text" id="namaKasir" placeholder="Nama Kasir">
    <button class="btn btn-primary" onclick="loginKasir()">MASUK</button>
  </div>
  <div id="appSection" class="hidden">
    <div class="tabs">
      <div class="tab active" onclick="gantiTab('kasir')">Kasir</div>
      <div class="tab" onclick="gantiTab('laporan')">Laporan</div>
    </div>
    <div class="content">
      <div class="info-box">
        Shift: <b id="infoShift">-</b> | Kasir: <b id="infoKasir">-</b>
        <button class="btn" style="padding:5px;margin-top:5px" onclick="logoutKasir()">Logout / Ganti Kasir</button>
      </div>
      <div id="kasir" class="section active">
        <div class="menu-grid" id="menuGrid"></div>
        <div class="cart">
          <h4>Keranjang:</h4>
          <div id="listKeranjang"></div>
          <div class="total">Total: Rp <span id="totalHarga">0</span></div>
          <select id="metodeBayar">
            <option value="CASH">CASH</option>
            <option value="QRIS">QRIS</option>
          </select>
          <input type="number" id="uangBayar" placeholder="Uang Bayar" onkeyup="hitungKembalian()">
          <div>Kembalian: Rp <span id="kembalian">0</span></div>
          <button class="btn btn-primary" onclick="prosesSimpanTrx()">SIMPAN TRANSAKSI</button>
        </div>
      </div>
      <div id="laporan" class="section">
        <div class="info-box">
          Total Transaksi: <b id="totalTrx">0</b><br>
          Total Omset: <b>Rp <span id="totalOmset">0</span></b><br>
          CASH: Rp <span id="omsetCash">0</span> | QRIS: Rp <span id="omsetQris">0</span>
        </div>
        <table id="tabelLaporan">
          <thead><tr><th>Menu</th><th>Qty</th><th>Omset</th></tr></thead>
          <tbody></tbody>
        </table>
        <button class="btn btn-success" onclick="kirimLaporanWA()">Kirim Laporan ke WA Owner</button>
        <button class="btn btn-danger" onclick="hapusSemuaLaporan()">Hapus Semua Laporan</button>
      </div>
    </div>
  </div>
</div>
<script>
const NAMA_WARKOP = "Warkop Singo";
let menu = [
  {nama:"Kopi Tubruk",harga:4000},
  {nama:"Kopi Susu",harga:5000},
  {nama:"Teh Panas",harga:3000},
  {nama:"Es Teh",harga:4000},
  {nama:"Indomie Rebus",harga:7000},
  {nama:"Indomie Goreng",harga:8000}
];
let keranjang = [];
let transaksi = JSON.parse(localStorage.getItem('transaksiWarkop')||'[]');

function loginKasir(){
  const shift = document.getElementById('pilihShift').value;
  const kasir = document.getElementById('namaKasir').value;
  if(!shift ||!kasir) return alert('Isi shift dan nama kasir!');
  localStorage.setItem('shiftAktif',shift);
  localStorage.setItem('namaKasir',kasir);
  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('appSection').classList.remove('hidden');
  document.getElementById('infoShift').innerText = shift;
  document.getElementById('infoKasir').innerText = kasir;
  tampilMenu();
  updateLaporan();
}

function logoutKasir(){
  if(confirm('Yakin logout?')){
    localStorage.removeItem('shiftAktif');
    localStorage.removeItem('namaKasir');
    location.reload();
  }
}

function cekLogin(){
  const shiftAktif = localStorage.getItem('shiftAktif');
  const kasirAktif = localStorage.getItem('namaKasir');
  if(shiftAktif && kasirAktif){
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('appSection').classList.remove('hidden');
    document.getElementById('infoShift').innerText = shiftAktif;
    document.getElementById('infoKasir').innerText = kasirAktif;
  }
}

function gantiTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.add('active');
  if(tab=='laporan') updateLaporan();
}

function tampilMenu(){
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  menu.forEach(m=>{
    grid.innerHTML += `<div class="menu-item" onclick="tambahKeranjang('${m.nama}',${m.harga})"><b>${m.nama}</b><br>Rp ${m.harga.toLocaleString('id-ID')}</div>`;
  });
}

function tambahKeranjang(nama,harga){
  const idx = keranjang.findIndex(k=>k.nama==nama);
  if(idx>=0) keranjang[idx].jumlah++;
  else keranjang.push({nama,harga,jumlah:1});
  updateKeranjang();
}

function updateKeranjang(){
  const list = document.getElementById('listKeranjang');
  list.innerHTML = '';
  let total = 0;
  keranjang.forEach((k,i)=>{
    const subtotal = k.harga * k.jumlah;
    total += subtotal;
    list.innerHTML += `<div class="cart-item"><span>${k.nama} x${k.jumlah}</span><span>Rp ${subtotal.toLocaleString('id-ID')} <button onclick="hapusItem(${i})">x</button></span></div>`;
  });
  document.getElementById('totalHarga').innerText = total.toLocaleString('id-ID');
  hitungKembalian();
}

function hapusItem(i){
  keranjang.splice(i,1);
  updateKeranjang();
}

function hitungKembalian(){
  const total = keranjang.reduce((a,b)=>a+(b.harga*b.jumlah),0);
  const bayar = parseInt(document.getElementById('uangBayar').value)||0;
  const kembalian = bayar - total;
  document.getElementById('kembalian').innerText = kembalian>0?kembalian.toLocaleString('id-ID'):0;
}

function prosesSimpanTrx(){
  if(keranjang.length==0) return alert('Keranjang kosong!');
  const total = keranjang.reduce((a,b)=>a+(b.harga*b.jumlah),0);
  const metode = document.getElementById('metodeBayar').value;
  const bayar = parseInt(document.getElementById('uangBayar').value)||0;
  if(metode=='CASH' && bayar<total) return alert('Uang kurang!');
  const kembalian = metode=='CASH'?bayar-total:0;
  const bukti = metode=='QRIS'?prompt('Masukkan bukti/no.ref QRIS:'):'';
  const shiftAktif = localStorage.getItem('shiftAktif');
  const kasirAktif = localStorage.getItem('namaKasir');
  transaksi.push({
    id: Date.now(),
    tanggal: new Date().toISOString(),
    items: keranjang.map(k=>({...k,subtotal:k.harga*k.jumlah})),
    total,
    metodeBayar: metode,
    bayar,
    kembalian,
    buktiQris: bukti,
    shift: shiftAktif,
    kasir: kasirAktif
  });
  localStorage.setItem('transaksiWarkop',JSON.stringify(transaksi));
  alert('Transaksi berhasil disimpan!');
  keranjang = [];
  document.getElementById('uangBayar').value = '';
  updateKeranjang();
  updateLaporan();
}

function updateLaporan(){
  const hariIni = new Date().toDateString();
  const shiftAktif = localStorage.getItem('shiftAktif') || '-';
  const kasirAktif = localStorage.getItem('namaKasir') || '-';
  document.getElementById('infoShift').innerText = shiftAktif;
  document.getElementById('infoKasir').innerText = kasirAktif;
  const trxShiftIni = (shiftAktif==='-'||kasirAktif==='-')?[]:transaksi.filter(t=>
    new Date(t.tanggal).toDateString()===hariIni &&
    t.shift===shiftAktif &&
    t.kasir===kasirAktif
  );
  const omset = trxShiftIni.reduce((a,b)=>a+b.total,0);
  const omsetCash = trxShiftIni.filter(t=>t.metodeBayar=='CASH').reduce((a,b)=>a+b.total,0);
  const omsetQris = trxShiftIni.filter(t=>t.metodeBayar=='QRIS').reduce((a,b)=>a+b.total,0);
  document.getElementById('totalTrx').innerText = trxShiftIni.length;
  document.getElementById('totalOmset').innerText = omset.toLocaleString('id-ID');
  document.getElementById('omsetCash').innerText = omsetCash.toLocaleString('id-ID');
  document.getElementById('omsetQris').innerText = omsetQris.toLocaleString('id-ID');
  const menuTerjual = {};
  trxShiftIni.forEach(t => {
    t.items.forEach(item => {
      if(!menuTerjual[item.nama]) menuTerjual[item.nama] = {qty:0,omset:0};
      menuTerjual[item.nama].qty += item.jumlah;
      menuTerjual[item.nama].omset += item.subtotal;
    });
  });
  const tbody = document.querySelector('#tabelLaporan tbody');
  tbody.innerHTML = '';
  Object.keys(menuTerjual).sort((a,b)=>menuTerjual[b].qty-menuTerjual[a].qty).forEach(nama => {
    const data = menuTerjual[nama];
    tbody.innerHTML += `<tr><td>${nama}</td><td>${data.qty}</td><td>Rp ${data.omset.toLocaleString('id-ID')}</td></tr>`;
  });
}

function kirimLaporanWA(){
  const hariIni = new Date().toDateString();
  const shiftAktif = localStorage.getItem('shiftAktif');
  const kasirAktif = localStorage.getItem('namaKasir');
  if(!shiftAktif ||!kasirAktif) return alert('Login dulu prof!');
  const trxShiftIni = transaksi.filter(t=>
    new Date(t.tanggal).toDateString()===hariIni &&
    t.shift===shiftAktif &&
    t.kasir===kasirAktif
  );
  if(trxShiftIni.length === 0){
    return alert('Belum ada transaksi di shift ' + shiftAktif);
  }
  const omset = trxShiftIni.reduce((a,b)=>a+b.total,0);
  const omsetCash = trxShiftIni.filter(t=>t.metodeBayar=='CASH').reduce((a,b)=>a+b.total,0);
  const omsetQris = trxShiftIni.filter(t=>t.metodeBayar=='QRIS').reduce((a,b)=>a+b.total,0);
  const tgl = new Date().toLocaleDateString('id-ID');
  const jam = new Date().toLocaleTimeString('id-ID');
  const menuTerjual = {};
  trxShiftIni.forEach(t => {
    t.items.forEach(item => {
      if(!menuTerjual[item.nama]) menuTerjual[item.nama] = {qty:0,omset:0};
      menuTerjual[item.nama].qty += item.jumlah;
      menuTerjual[item.nama].omset += item.subtotal;
    });
  });
  const itemTerlaris = Object.keys(menuTerjual).sort((a,b)=>menuTerjual[b].qty-menuTerjual[a].qty)[0] || '-';
  let pesan = `*LAPORAN SHIFT ${shiftAktif} - ${NAMA_WARKOP.toUpperCase()}*%0A`;
  pesan += `Kasir: ${kasirAktif}%0A`;
  pesan += `Tanggal: ${tgl} ${jam}%0A`;
  pesan += `________________________%0A`;
  pesan += `Total Transaksi: ${trxShiftIni.length}%0A`;
  pesan += `Total Omset: *Rp ${omset.toLocaleString('id-ID')}*%0A`;
  pesan += `CASH: Rp ${omsetCash.toLocaleString('id-ID')}%0A`;
  pesan += `QRIS: Rp ${omsetQris.toLocaleString('id-ID')}%0A`;
  pesan += `Item Terlaris: ${itemTerlaris}%0A`;
  pesan += `________________________%0A`;
  pesan += `_Laporan per shift. Privasi terjaga_`;
  let noTujuan = localStorage.getItem('noWaOwner') || '628123456789';
  let url = `https://wa.me/${noTujuan}?text=${pesan}`;
  window.open(url, '_blank');
}

function hapusSemuaLaporan(){
  if(confirm('Yakin hapus semua data transaksi? Data tidak bisa dikembalikan!')){
    transaksi = [];
    localStorage.setItem('transaksiWarkop',JSON.stringify(transaksi));
    updateLaporan();
    alert('Semua data berhasil dihapus!');
  }
}

cekLogin();
tampilMenu();
updateLaporan();
</script>
</body>
  </html>
