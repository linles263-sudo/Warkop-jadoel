<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warkop Singo - POS</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --danger-red: #d32f2f;
            --warning-orange: #ff9800;
            --bg-gray: #f4f4f4;
        }

        body { font-family: Arial, sans-serif; background: var(--bg-gray); margin: 0; padding: 0; }
        
        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }

        /* Main App Header */
        header { background: var(--primary-green); color: white; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid var(--primary-green); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--primary-green); color: white; }

        /* Content Area */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-send { background: var(--light-green); }
        .btn-download { background: #1b5e20; }
        .btn-danger { background: var(--danger-red); }
        .btn-orange { background: var(--warning-orange); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>☕ WARKOP SINGO</h2>
        <input type="text" id="user-input" placeholder="Nama Kasir">
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn btn-send" onclick="handleLogin()">LOGIN</button>
    </div>
</div>

<div id="app-screen" class="hidden">
    <header>
        <h2>☕ WARKOP SINGO</h2>
        <small id="shift-info">Shift: SORE | Kasir: <span id="kasir-name"></span></small>
    </header>

    <nav class="nav-tabs">
        <div class="tab">Kasir</div>
        <div class="tab">Minuman</div>
        <div class="tab">Rokok</div>
        <div class="tab active">Laporan</div>
    </nav>

    <div class="container">
        <div class="card">
            <h3 style="color: var(--primary-green); margin-top: 0;">Laporan Hari Ini</h3>
            <p>Total Transaksi: <strong id="t-count">0</strong></p>
            <p>Total Omset: <strong>Rp <span id="t-omset">0</span></strong></p>
            <p>CASH: <strong>Rp <span id="t-cash">0</span></strong> | QRIS: <strong>Rp 0</strong></p>

            <button class="btn btn-send" onclick="alert('Laporan dikirim ke WA!')">📲 Kirim Laporan ke WA Owner</button>
            <button class="btn btn-download">📥 Download Laporan Excel</button>
            <button class="btn btn-danger" onclick="resetLaporan()">Hapus Semua Laporan</button>
            <button class="btn btn-danger" onclick="handleLogout()">🚪 LOGOUT / GANTI KASIR</button>
        </div>

        <div class="card">
            <h3 style="color: var(--primary-green); margin-top: 0;">⚙️ Setting</h3>
            <input type="file">
            <button class="btn btn-download">💾 Simpan Gambar QRIS</button>
            <button class="btn btn-orange">🔄 Ganti Data Warkop</button>
        </div>
        
        <center><small style="color: #ccc;">WKP-SGO-01</small></center>
    </div>
</div>

<script>
    // Data Sederhana (State)
    let state = {
        kasir: "",
        transaksi: 1,
        omset: 4000
    };

    // Fungsi Login
    function handleLogin() {
        const user = document.getElementById('user-input').value;
        const pass = document.getElementById('pass-input').value;

        if(user !== "" && pass === "1234") { // Password dummy: 1234
            state.kasir = user;
            document.getElementById('kasir-name').innerText = user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            updateUI();
        } else {
            alert("Login Gagal! (Tips: Pass adalah 1234)");
        }
    }

    // Fungsi Logout
    function handleLogout() {
        if(confirm("Apakah anda ingin logout?")) {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('user-input').value = "";
            document.getElementById('pass-input').value = "";
        }
    }

    // Fungsi Reset
    function resetLaporan() {
        if(confirm("Hapus semua data hari ini?")) {
            state.transaksi = 0;
            state.omset = 0;
            updateUI();
        }
    }

    // Update Tampilan Angka
    function updateUI() {
        document.getElementById('t-count').innerText = state.transaksi;
        document.getElementById('t-omset').innerText = state.omset.toLocaleString('id-ID');
        document.getElementById('t-cash').innerText = state.omset.toLocaleString('id-ID');
    }

    // Inisialisasi awal
    updateUI();
</script>

</body>
</html>
