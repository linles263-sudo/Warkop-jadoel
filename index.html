<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warkop Singo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333}
   .container{max-width:100%;margin:0 auto;background:white;min-height:100vh}
   .header{background:#2e7d32;color:white;padding:15px;text-align:center}
   .tabs{display:flex;background:#4caf50;height:auto}
   .tab{flex:1;padding:12px;text-align:center;color:white;cursor:pointer;border:none;background:transparent}
   .tab.active{background:#2e7d32;font-weight:bold}
   .section{display:none;padding:15px}
   .section.active{display:block}
   .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:15px 0}
   .menu-item{background:white;border:2px solid #e0e0e0;border-radius:8px;padding:10px;text-align:center;cursor:pointer;position:relative}
   .menu-item:hover{border-color:#4caf50}
   .menu-item.habis{opacity:0.5;cursor:not-allowed}
   .menu-item h4{font-size:14px;margin-bottom:5px}
   .menu-item.harga{color:#2e7d32;font-weight:bold;font-size:16px}
   .stok-info{font-size:11px;color:#666;margin-top:5px}
   .badge-habis{position:absolute;top:5px;right:5px;background:#f44336;color:white;font-size:10px;padding:2px 6px;border-radius:10px}
   .btn-hapus-menu{position:absolute;top:5px;left:5px;background:#f44336;color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer}
   .btn{padding:10px 15px;border:none;border-radius:5px;cursor:pointer;font-size:14px;margin:5px}
   .btn-add{background:#4caf50;color:white}
   .btn-export{background:#2196f3;color:white}
   .btn-reset{background:#f44336;color:white}
   .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
   .modal-content{background:white;margin:10% auto;padding:20px;width:90%;max-width:400px;border-radius:8px}
   .form-group{margin:15px 0}
   .form-group label{display:block;margin-bottom:5px;font-weight:bold}
   .form-group input{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px}
   .total-section{background:#e8f5e9;padding:15px;border-radius:8px;margin:15px 0}
   .keranjang-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
   .laporan-table{width:100%;border-collapse:collapse;margin:15px 0;font-size:12px}
   .laporan-table th,.laporan-table td{border:1px solid #ddd;padding:8px;text-align:left}
   .laporan-table th{background:#f5f5f5}
   .qr-container{text-align:center;margin:15px 0}
   .qr-container img{max-width:200px}
    #cariMenu{width:100%;padding:10px;margin:10px 0;border:2px solid #ddd;border-radius:5px}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>☕ WARKOP SINGO</h1>
      <p id="kodeWarkop">WS001</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="gantiTab(this, 'kasir')">Kasir</button>
      <button class="tab" onclick="gantiTab(this, 'minuman')">Minuman</button>
      <button class="tab" onclick="gantiTab(this, 'rokok')">Rokok</button>
      <button class="tab" onclick="gantiTab(this, 'laporan')">Laporan</button>
    </div>

    <div id="kasir" class="section active">
      <button class="btn btn-add" onclick="bukaModal('minuman')">+ Tambah Menu Minuman</button>
      <button class="btn btn-add" onclick="bukaModal('rokok')">+ Tambah Menu Rokok</button>
      <input type="text" id="cariMenu" placeholder="🔍 Ketik nama menu..." onkeyup="cariMenu()">
      <h4 style="margin-top:15px">Semua Menu:</h4>
      <div class="menu-grid" id="semuaMenu"></div>
      <div class="total-section">
        <h3>Keranjang:</h3>
        <div id="daftarKeranjang"></div>
        <hr style="margin:10px 0">
        <h2>Total: Rp <span id="totalHarga">0</span></h2>
        <button class="btn btn-add" onclick="prosesBayar()" style="width:100%">💰 BAYAR</button>
      </div>
    </div>

    <div id="minuman" class="section">
      <button class="btn btn-add" onclick="bukaModal('minuman')">+ Tambah Menu</button>
      <div class="menu-grid" id="menuMinuman"></div>
    </div>

    <div id="rokok" class="section">
      <button class="btn btn-add" onclick="bukaModal('rokok')">+ Tambah Menu</button>
      <div class="menu-grid" id="menuRokok"></div>
    </div>

    <div id="laporan" class="section">
      <button class="btn btn-export" onclick="exportExcel()">📊 Export Excel</button>
      <button class="btn btn-reset" onclick="hapusSemuaLaporan()">🗑️ Hapus Semua</button>
      <h4>Total Omset: Rp <span id="totalOmset">0</span></h4>
      <table class="laporan-table">
        <thead>
          <tr><th>Tanggal</th><th>Menu</th><th>Qty</th><th>Total</th></tr>
        </thead>
        <tbody id="tabelLaporan"></tbody>
      </table>
    </div>
  </div>

  <div id="modalBayar" class="modal">
    <div class="modal-content">
      <h3>Pembayaran</h3>
      <div class="qr-container">
        <p>Scan QRIS:</p>
        <img id="gambarQris" src="" alt="QRIS">
        <p style="font-size:12px;margin-top:10px">WARKOP SINGO</p>
      </div>
      <button class="btn btn-add" onclick="selesaiBayar()" style="width:100%">✅ Selesai</button>
      <button class="btn" onclick="tutupModalBayar()" style="width:100%">Batal</button>
    </div>
  </div>

  <div id="modalMenu" class="modal">
    <div class="modal-content">
      <h3 id="judulModalMenu">Tambah Menu</h3>
      <div class="form-group">
        <label>Nama Menu:</label>
        <input type="text" id="namaMenuBaru">
      </div>
      <div class="form-group">
        <label>Harga:</label>
        <input type="number" id="hargaMenuBaru">
      </div>
      <div class="form-group">
        <label>Stok:</label>
        <input type="number" id="stokMenuBaru" value="10">
      </div>
      <button class="btn btn-add" onclick="simpanMenuBaru()">Simpan</button>
      <button class="btn" onclick="tutupModal()">Batal</button>
    </div>
  </div>

<script>
let menuMinuman = JSON.parse(localStorage.getItem('menuMinuman')) || [
  {nama:'Kopi Hitam',harga:5000,stok:20},
  {nama:'Kopi Susu',harga:6000,stok:20},
  {nama:'Teh Panas',harga:3000,stok:30},
  {nama:'Es Teh',harga:4000,stok:30}
];
let menuRokok = JSON.parse(localStorage.getItem('menuRokok')) || [
  {nama:'Surya 12',harga:24000,stok:10},
  {nama:'Gudang Garam',harga:22000,stok:10},
  {nama:'Djarum Super',harga:23000,stok:10}
];
let transaksi = JSON.parse(localStorage.getItem('transaksiWarkop')) || [];
let keranjang = [];
let jenisMenuAktif = 'minuman';
const GAMBAR_QRIS = 'https://i.ibb.co/7Yj8H6p/qris.png';

document.getElementById('kodeWarkop').innerText = 'WS001';
document.getElementById('gambarQris').src = GAMBAR_QRIS;

function gantiTab(el, tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab).classList.add('active');
  if(tab=='laporan') updateLaporan();
}

function tampilSemuaMenu(){
  const semua = [...menuMinuman,...menuRokok].filter(m=>m.stok>0);
  tampilMenuGrid('semuaMenu',semua,false);
  tampilMenuGrid('menuMinuman',menuMinuman,true);
  tampilMenuGrid('menuRokok',menuRokok,true);
}

function tampilMenuGrid(id,data,bisaHapus){
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  data.forEach((m,i)=>{
    let tombolHapus = bisaHapus? `<button class="btn-hapus-menu" onclick="hapusMenu('${id}',${i})">×</button>` : '';
    let classHabis = m.stok<=0? 'menu-item habis' : 'menu-item';
    let badgeHabis = m.stok<=0? '<div class="badge-habis">HABIS</div>' : '';
    let stokInfo = `<div class="stok-info">Stok: ${m.stok}</div>`;
    let onclick = m.stok<=0? '' : `onclick="tambahKeKeranjang('${m.nama}',${m.harga},'${id}',${i})"`;
    grid.innerHTML += `
      <div class="${classHabis}" ${onclick}>
        ${tombolHapus}
        ${badgeHabis}
        <h4>${m.nama}</h4>
        <div class="harga">Rp ${m.harga.toLocaleString()}</div>
        ${stokInfo}
      </div>
    `;
  });
}

function tambahKeKeranjang(nama,harga,idMenu,index){
  let dataMenu = idMenu=='menuMinuman'? menuMinuman : idMenu=='menuRokok'? menuRokok : [...menuMinuman,...menuRokok];
  let stokIndex = idMenu=='semuaMenu'? dataMenu.findIndex(m=>m.nama==nama) : index;
  if(dataMenu[stokIndex].stok<=0) return alert('Stok habis!');

  let cek = keranjang.find(k=>k.nama==nama);
  if(cek){
    if(cek.qty >= dataMenu[stokIndex].stok) return alert('Stok tidak cukup!');
    cek.qty++;
  } else {
    keranjang.push({nama,harga,qty:1,idMenu,index:stokIndex});
  }
  updateKeranjang();
}

function updateKeranjang(){
  const div = document.getElementById('daftarKeranjang');
  div.innerHTML = '';
  let total = 0;
  keranjang.forEach((k,i)=>{
    let subtotal = k.harga * k.qty;
    total += subtotal;
    div.innerHTML += `
      <div class="keranjang-item">
        <span>${k.nama} x${k.qty}</span>
        <span>Rp ${subtotal.toLocaleString()} <button onclick="hapusKeranjang(${i})" style="color:red;border:none;background:none">×</button></span>
      </div>
    `;
  });
  document.getElementById('totalHarga').innerText = total.toLocaleString();
}

function hapusKeranjang(i){
  keranjang.splice(i,1);
  updateKeranjang();
}

function prosesBayar(){
  if(keranjang.length==0) return alert('Keranjang kosong!');
  document.getElementById('modalBayar').style.display = 'block';
}

function tutupModalBayar(){
  document.getElementById('modalBayar').style.display = 'none';
}

function selesaiBayar(){
  keranjang.forEach(k=>{
    let dataMenu = k.idMenu=='menuMinuman'? menuMinuman : menuRokok;
    dataMenu[k.index].stok -= k.qty;

    transaksi.push({
      tanggal: new Date().toLocaleString('id-ID'),
      menu: k.nama,
      qty: k.qty,
      total: k.harga * k.qty
    });
  });

  localStorage.setItem('menuMinuman',JSON.stringify(menuMinuman));
  localStorage.setItem('menuRokok',JSON.stringify(menuRokok));
  localStorage.setItem('transaksiWarkop',JSON.stringify(transaksi));

  keranjang = [];
  updateKeranjang();
  tampilSemuaMenu();
  tutupModalBayar();
  alert('Pembayaran berhasil!');
}

function bukaModal(jenis){
  jenisMenuAktif = jenis;
  document.getElementById('judulModalMenu').innerText = `Tambah Menu ${jenis=='minuman'?'Minuman':'Rokok'}`;
  document.getElementById('modalMenu').style.display = 'block';
  document.getElementById('namaMenuBaru').value = '';
  document.getElementById('hargaMenuBaru').value = '';
  document.getElementById('stokMenuBaru').value = '10';
}

function tutupModal(){
  document.getElementById('modalMenu').style.display = 'none';
}

function simpanMenuBaru(){
  const nama = document.getElementById('namaMenuBaru').value;
  const harga = parseInt(document.getElementById('hargaMenuBaru').value);
  const stok = parseInt(document.getElementById('stokMenuBaru').value) || 0;
  if(!nama ||!harga) return alert('Isi nama dan harga!');

  if(jenisMenuAktif=='minuman'){
    menuMinuman.push({nama,harga,stok});
    localStorage.setItem('menuMinuman',JSON.stringify(menuMinuman));
  } else {
    menuRokok.push({nama,harga,stok});
    localStorage.setItem('menuRokok',JSON.stringify(menuRokok));
  }
  tampilSemuaMenu();
  tutupModal();
  alert('Menu berhasil ditambah!');
}

function hapusMenu(id,index){
  event.stopPropagation();
  if(!confirm('Hapus menu ini?')) return;
  if(id=='menuMinuman'){
    menuMinuman.splice(index,1);
    localStorage.setItem('menuMinuman',JSON.stringify(menuMinuman));
  } else {
    menuRokok.splice(index,1);
    localStorage.setItem('menuRokok',JSON.stringify(menuRokok));
  }
  tampilSemuaMenu();
}

function cariMenu(){
  const keyword = document.getElementById('cariMenu').value.toLowerCase();
  const semua = [...menuMinuman,...menuRokok].filter(m=>m.stok>0 && m.nama.toLowerCase().includes(keyword));
  tampilMenuGrid('semuaMenu',semua,false);
}

function updateLaporan(){
  const tbody = document.getElementById('tabelLaporan');
  tbody.innerHTML = '';
  let total = 0;
  transaksi.forEach(t=>{
    total += t.total;
    tbody.innerHTML += `
      <tr>
        <td>${t.tanggal}</td>
        <td>${t.menu}</td>
        <td>${t.qty}</td>
        <td>Rp ${t.total.toLocaleString()}</td>
      </tr>
    `;
  });
  document.getElementById('totalOmset').innerText = total.toLocaleString();
}

function exportExcel(){
  const data = [['Tanggal','Menu','Qty','Total']];
  transaksi.forEach(t=>{
    data.push([t.tanggal,t.menu,t.qty,t.total]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Laporan');
  XLSX.writeFile(wb,`Laporan_Warkop_${new Date().toLocaleDateString('id-ID')}.xlsx`);
}

function hapusSemuaLaporan(){
  if(confirm('Yakin hapus semua data transaksi? Stok tidak direset. Data tidak bisa dikembalikan!')){
    transaksi = [];
    localStorage.setItem('transaksiWarkop',JSON.stringify(transaksi));
    updateLaporan();
    alert('Semua data transaksi berhasil dihapus!');
  }
}

tampilSemuaMenu();
updateLaporan();
</script>
</body>
  </html>
